name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
            artifact-name: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
            artifact-name: macos-intel
          - platform: windows-latest
            args: ''
            target: ''
            artifact-name: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Install nasm (macOS only)
        if: matrix.platform == 'macos-latest'
        run: brew install nasm

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.19
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Stage macOS artifact
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p staging
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg staging/ || true

      - name: Stage Windows artifact
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "src-tauri/target/release/bundle/nsis/*.exe" staging/ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" staging/ -ErrorAction SilentlyContinue

      - name: Upload staged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: staging/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: ls -R artifacts/

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 'Latest Build (${{ steps.sha.outputs.short }})'
          body: |
            Automatic build from commit ${{ github.sha }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS Apple Silicon (M1/M2/M3) | `*-aarch64.dmg` |
            | macOS Intel | `*-x86_64.dmg` |
            | Windows | `*-setup.exe` or `*.msi` |
          prerelease: false
          make_latest: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
